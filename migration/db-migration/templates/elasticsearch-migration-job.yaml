{{- if .Values.jobs.elasticsearch.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.jobs.elasticsearch.name }}
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    type: elasticsearch
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: migration
        type: elasticsearch
        release: {{ .Release.Name }}
    spec:
      restartPolicy: Never

      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}

      containers:
      - name: elasticsearch-migration
        image: "python:3.11-slim"
        imagePullPolicy: IfNotPresent

        command:
        - /bin/bash
        - -c
        - |
          apt-get update -qq && apt-get install -y -qq curl nodejs npm &&
          npm install -g elasticdump --quiet &&
          python3 /scripts/migrate_elasticsearch.py

        env:
        - name: OLD_ES_HOST
          value: "{{ .Values.elasticsearchMigration.oldEsHost }}"
        - name: NEW_ES_HOST
          value: "{{ .Values.elasticsearchMigration.newEsHost }}"
        - name: AZURE_ACCOUNT
          value: "{{ .Values.elasticsearchMigration.azureAccount }}"
        - name: AZURE_KEY
          value: "{{ .Values.elasticsearchMigration.azureKey }}"
        - name: AZURE_CONTAINER
          value: "{{ .Values.elasticsearchMigration.azureContainer }}"
        - name: AZURE_BASE_PATH
          value: "{{ .Values.elasticsearchMigration.azureBasePath }}"
        - name: REPO_NAME
          value: "{{ .Values.elasticsearchMigration.repoName | default "azure_backup" }}"
        - name: SNAPSHOT_NAME
          value: "{{ .Values.elasticsearchMigration.snapshotName | default "snapshot_1" }}"
        - name: OLD_ES_NAMESPACE
          value: "{{ .Values.elasticsearchMigration.oldEsNamespace | default "sunbird" }}"
        - name: OLD_ES_POD
          value: "{{ .Values.elasticsearchMigration.oldEsPod | default "elasticsearch-master-0" }}"
        - name: OLD_ES_CONTAINER
          value: "{{ .Values.elasticsearchMigration.oldEsContainer | default "elasticsearch" }}"
        - name: NEW_ES_NAMESPACE
          value: "{{ .Values.job.namespace }}"
        - name: NEW_ES_POD
          value: "elasticsearch-master-0"
        - name: NEW_ES_CONTAINER
          value: "elasticsearch"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1"

        volumeMounts:
        - name: script-volume
          mountPath: /scripts
          readOnly: true
        - name: logs-volume
          mountPath: /var/log/migration

      terminationGracePeriodSeconds: 7200

      volumes:
      - name: script-volume
        configMap:
          name: {{ .Values.configMap.name }}
          defaultMode: 0755
          optional: false
      - name: logs-volume
        emptyDir:
          medium: {{ .Values.volumes.logs.medium | quote }}
          sizeLimit: {{ .Values.volumes.logs.sizeLimit }}
{{- end }}

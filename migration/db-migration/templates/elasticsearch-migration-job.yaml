{{- if .Values.jobs.elasticsearch.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.jobs.elasticsearch.name }}
  namespace: {{ .Values.job.namespace }}
  labels:
    app: migration
    type: elasticsearch
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: migration
        type: elasticsearch
        release: {{ .Release.Name }}
    spec:
      restartPolicy: Never

      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}

      containers:
      - name: elasticsearch-migration
        image: "python:3.11-slim"
        imagePullPolicy: IfNotPresent

        command:
        - /bin/bash
        - -c
        - |
          set -e
          apt-get update -qq && apt-get install -y -qq curl ca-certificates

          # Install kubectl (direct binary — avoids Debian 13 GPG v3 signature rejection)
          curl -sSL "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl" -o /tmp/kubectl
          chmod +x /tmp/kubectl && mv /tmp/kubectl /usr/local/bin/kubectl

          # Install Azure CLI
          curl -sL https://aka.ms/InstallAzureCLIDeb | bash

          python3 /scripts/migrate_elasticsearch.py

        env:
        - name: AZURE_STORAGE_ACCOUNT_NAME
          value: "{{ .Values.elasticsearchMigration.azureStorageAccountName }}"
        - name: AZURE_STORAGE_ACCOUNT_KEY
          value: "{{ .Values.elasticsearchMigration.azureStorageAccountKey }}"
        - name: AZURE_CONTAINER_NAME
          value: "{{ .Values.elasticsearchMigration.azureContainerName }}"
        - name: AZURE_BASE_PATH
          value: "{{ .Values.elasticsearchMigration.azureBasePath }}"
        - name: SNAPSHOT_NAME
          value: "{{ .Values.elasticsearchMigration.snapshotName }}"
        - name: REPOSITORY_NAME
          value: "{{ .Values.elasticsearchMigration.repositoryName }}"
        - name: OLD_ES_URL
          value: "{{ .Values.elasticsearchMigration.oldEsUrl }}"
        - name: NEW_ES_URL
          value: "{{ .Values.elasticsearchMigration.newEsUrl }}"
        - name: NEW_ES_POD_NAME
          value: "{{ .Values.elasticsearchMigration.newEsPodName }}"
        - name: NEW_ES_NAMESPACE
          value: "{{ .Values.elasticsearchMigration.newEsNamespace }}"
        - name: ES_KEYSTORE_PATH
          value: "{{ .Values.elasticsearchMigration.esKeystorePath }}"

        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"

        volumeMounts:
        - name: script-volume
          mountPath: /scripts
          readOnly: true
        - name: logs-volume
          mountPath: /var/log/migration

      terminationGracePeriodSeconds: 7200

      volumes:
      - name: script-volume
        configMap:
          name: {{ .Values.configMap.name }}
          defaultMode: 0755
          optional: false
      - name: logs-volume
        emptyDir:
          medium: {{ .Values.volumes.logs.medium | quote }}
          sizeLimit: {{ .Values.volumes.logs.sizeLimit }}
{{- end }}

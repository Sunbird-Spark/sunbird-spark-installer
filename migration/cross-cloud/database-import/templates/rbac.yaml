apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "database-import.fullname" . }}-pod-manager
  namespace: {{ .Values.databases.janusgraph.namespace | default "sunbird" }}
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec", "pods/log"]
  verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "database-import.fullname" . }}-pod-manager-binding
  namespace: {{ .Values.databases.janusgraph.namespace | default "sunbird" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "database-import.fullname" . }}-pod-manager
subjects:
- kind: ServiceAccount
  name: {{ include "database-import.fullname" . }}-migration-sa
  namespace: {{ .Release.Namespace }}

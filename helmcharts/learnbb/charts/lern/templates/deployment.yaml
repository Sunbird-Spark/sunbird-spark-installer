apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "common.names.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "common.names.name" . }}
        {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.workload_identity_service_account_name }}
        azure.workload.identity/use: "true"
        {{- end }}
      annotations:
        checksum/config: {{ .Files.Glob "configs/*" | toYaml | sha256sum }}
    spec:
      {{- if .Values.global.workload_identity_service_account_name }}
      serviceAccountName: {{ .Values.global.workload_identity_service_account_name }}
      {{- else if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "common.names.fullname" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
      - name: lern-lib-merge
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
          - cp -r {{ .Values.lib_mount_path }}/. /merged-lib/
        volumeMounts:
        - name: lern-merged-lib
          mountPath: /merged-lib
      - name: lern-csp-aws-deps
        image: {{ .Values.aws_csp.maven_image }}
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            cat > /tmp/pom.xml <<'POM'
            <project xmlns="http://maven.apache.org/POM/4.0.0"><modelVersion>4.0.0</modelVersion><groupId>tmp</groupId><artifactId>tmp</artifactId><version>1</version>
            <dependencies><dependency><groupId>org.sunbird</groupId><artifactId>cloud-storage-sdk-aws</artifactId><version>{{ .Values.aws_csp.artifact_version }}</version></dependency></dependencies></project>
            POM
            mvn -f /tmp/pom.xml -q dependency:copy-dependencies -DoutputDirectory=/tmp/deps
            cp /tmp/deps/*.jar /merged-lib/
        volumeMounts:
        - name: lern-merged-lib
          mountPath: /merged-lib
      {{- end }}
      {{- if .Values.opa_enabled }}
      - name: proxy-init
        args:
          - -p
          - "9999"
          - -u
          - "1111"
          - -w
          - "8282,10000"
        image: openpolicyagent/proxy_init:v5
        imagePullPolicy: IfNotPresent
        resources:
          {{- toYaml .Values.init_container_resources | nindent 10 }}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          runAsNonRoot: false
          runAsUser: 0
      {{- end }}
      {{- with .Values.initContainers }}
        {{- toYaml . | nindent 6 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          ports:
            {{- range .Values.service.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
          - name: sunbird_sso_publickey
            valueFrom:
              configMapKeyRef:
                name: {{ .Values.global.keycloak_kid_keys_configmap }}
                key: KEYCLOAK_PUBLIC_KEY
          envFrom:
          - configMapRef:
              name: {{ include "common.names.fullname" . }}-env
          volumeMounts:
          {{- if .Values.configmap.enabled }}
          - name: config
            mountPath: {{ .Values.configmap.mountPath }}
          {{- end }}
          {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
          - name: lern-merged-lib
            mountPath: {{ .Values.lib_mount_path }}
          {{- end }}
          - name: keys
            mountPath: /keys/
{{- if .Values.opa_enabled }}
        - args:
          - envoy
          - --config-path
          - /config/config.yaml
          env:
          - name: ENVOY_UID
            value: "1111"
          image: envoyproxy/envoy:v1.20.0
          imagePullPolicy: IfNotPresent
          name: envoy
          livenessProbe:
            {{ toYaml .Values.envoy_probes | nindent 12 }}
          readinessProbe:
            {{ toYaml .Values.envoy_probes | nindent 12 }}
          resources:
            {{ toYaml .Values.envoy_resources | nindent 12 }}
          volumeMounts:
            - mountPath: /config
              name: envoy-config
              readOnly: true
        - command: ["/bin/sh", "-c"]
          args:
          - |
            KID=$(cat /keys/KEYCLOAK_PUBLIC_KEY_KID) && PUBLIC_KEY=$(cat /keys/KEYCLOAK_PUBLIC_KEY) && \
            PUBLIC_KEY_PEM=$(echo "$PUBLIC_KEY" | sed -e 's/.\{64\}/&\\\\n/g' -e '1s/^/-----BEGIN PUBLIC KEY-----\\\\n/' -e '$s/$/\\\\n-----END PUBLIC KEY-----/') && \
            mkdir /policies && cp -Lr /opa-policies/*.rego /policies && \
            sed -i "s|KEYCLOAK_KID|$KID|g" /policies/common.rego && \
            sed -i "s|KEYCLOAK_PUBLIC_KEY|$PUBLIC_KEY_PEM|g" /policies/common.rego && \
            /app/opa run --server /policies \
              --addr=localhost:8181 \
              --diagnostic-addr=0.0.0.0:8282 \
              --set=plugins.envoy_ext_authz_grpc.addr=:9191 \
              --set=plugins.envoy_ext_authz_grpc.path=main/allow \
              --set=decision_logs.plugin=print_decision_logs_on_failure \
              --set=plugins.print_decision_logs_on_failure.stdout=true \
              --log-level=error \
              --ignore=.*
          image: sunbirded.azurecr.io/opa:0.34.2-envoy
          imagePullPolicy: IfNotPresent
          name: opa
          livenessProbe:
            {{- toYaml .Values.opa_probes | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.opa_probes | nindent 12 }}
          resources:
            {{- toYaml .Values.opa_resources | nindent 12 }}
          volumeMounts:
            - mountPath: /opa-policies
              name: opa-policy
              readOnly: true
            - name: keycloak-key
              mountPath: /keys/
{{- end }}
        {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
      - name: env
        configMap:
          name: {{ include "common.names.fullname" . }}-env
      {{- if .Values.configmap.enabled }}
      - name: config
        configMap:
          name: {{ include "common.names.fullname" . }}
      {{- end }}
      {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
      - name: lern-merged-lib
        emptyDir: {}
      {{- end }}
      {{- if .Values.opa_enabled }}
      - name: envoy-config
        configMap:
          name: {{ include "common.names.fullname" . }}-envoy
      - name: opa-policy
        configMap:
          name: {{ include "common.names.fullname" . }}-opa
      - name: keycloak-key
        configMap:
          name: {{ .Values.global.keycloak_kid_keys_configmap }}
      {{- end }}
      - name: keys
        projected:
          sources:
          - configMap:
              name: {{ include "common.names.fullname" . }}-access-keys
          - configMap:
              name: {{ .Values.global.keycloak_key_configmap }}
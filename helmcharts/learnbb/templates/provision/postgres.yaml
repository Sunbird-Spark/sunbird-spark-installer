apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-postgres-migration-job
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}-postgres-migration
    scope: provisioning
  annotations:
    {{- .Values.global.postgresql.provisioning.annotations | toYaml | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-postgres-migration
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: alpine
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c']
          args:
            - |
              apk add --no-cache netcat-openbsd
              timeout {{ .Values.migration.postgresql.waitTime }} sh -c '
                until nc -z {{ .Values.global.postgresql.host }} {{ .Values.global.postgresql.port }};
                do
                  echo "Waiting for Postgres...";
                  sleep 10;
                done
              '
      containers:
        - name: postgres-migration
          image: {{ .Values.postgres_migration_image }}
          imagePullPolicy: IfNotPresent
          command: ['bash', '-c']
          securityContext:
            runAsUser: 0
          args:
            - |
              set -e
              export PGHOST={{ .Values.global.postgresql.host }}
              export PGPORT={{ .Values.global.postgresql.port }}
              export PGUSER={{ .Values.global.postgresql.postgresqlUsername }}
              export PGPASSWORD={{ .Values.global.postgresql.postgresqlPassword }}

              {{- range .Values.global.postgresql.databases }}
              echo "Ensuring database {{ .name }} exists"
              psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ .name }}'" | grep -q 1 || \
                psql -c "CREATE DATABASE \"{{ .name }}\""
              {{- end }}

              echo "PostgreSQL database provisioning completed."

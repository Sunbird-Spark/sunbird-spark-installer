{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  {{- if and .Values.global.cloud_storage (eq .Values.global.cloud_storage.type "azure") }}
  name: {{ .Values.global.service_account_name }}
  {{- else }}
  name: {{ include "common.names.fullname" . }}
  {{- end }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.global.client_id }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.global.client_id }}
  labels:
    azure.workload.identity/use: "true"
  {{- end }}
{{- end }}

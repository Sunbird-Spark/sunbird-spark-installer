# py-flink: consolidated chart for ai-pipeline's PyFlink 1.20 jobs,
# running in real Application Mode — job baked directly into a dedicated
# JobManager + TaskManager(s) Deployment pair per job (see
# templates/deployment.yaml), same shape as the sibling `flink` chart's
# JM/TM split. A JM restart re-runs the same startup command, which
# re-submits the job as a side effect — no separate resubmission step,
# same as Java/Scala jobs here.
#
# --job-classname is always org.apache.flink.client.python.PythonDriver
# (Flink's own generic driver for running a Python script as the
# cluster's job) — the job-specific bit is `pyEntrypoint` (the script
# path passed via -py), not a different Java class per job. Getting this
# working took fixing two real bugs (see templates/deployment.yaml's
# header comment for the full account): Kubernetes' `command:` field
# replacing the image's ENTRYPOINT outright, and PythonDriver's own
# strict arg parser breaking on any -D flag mixed into its args — all
# cluster config (ports, parallelism) must go via FLINK_PROPERTIES
# instead, exactly like the official Flink Kubernetes Operator's own
# FlinkDeployment spec does for PyFlink jobs.
#
# Structural pattern otherwise mirrors the sibling `flink` chart (../flink):
# one map of jobs (here `py_flink_jobs`, there `flink_jobs`), with
# templates/*.yaml ranging over that map and skipping any entry whose
# `enabled` is false. Each entry can override `resources` (falls back to
# the chart-level `resources` default below otherwise), same as
# `flink`'s flink_jobs.*.resources override.
#
# What's genuinely different from `flink` (see Chart.yaml description for
# the short version):
#   - no shared global.knowledgeflink image — each job entry names its
#     own helmcharts/images.yaml anchor via `globalImageKey`
#     (global.enrichment_router / global.caption_generator).
#   - config.yaml (ai-pipeline/jobs/<name>/config.yaml, upstream) is
#     reproduced verbatim under each job's `config:` key, rendered into a
#     ConfigMap and mounted at `configPath`. Secrets are deliberately left
#     out of `config:` — they're injected as SUNBIRD_AI_* env vars instead,
#     since ai-pipeline's JobConfig always prefers the env var override
#     over the YAML file value (see ai-pipeline/core/docs/01_config.md).
#
# NOTE on secrets (temporary): the knowlg platform requires no auth for
# these internal, same-cluster calls, so no key is needed there at all.
# The LLM (multilingual translation) API key IS a real external secret,
# but for now it's injected directly as a plaintext env var via
# `extraEnv` below (values-file-controlled) rather than a K8s Secret —
# deliberately simple to start; this must move to a proper Secret +
# secretEnv reference before any real deployment.

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  pullPolicy: IfNotPresent
  pullSecrets: []

podAnnotations: {}

podSecurityContext:
  runAsUser: 9999
  fsGroup: 9999

securityContext: {}

commonLabels: {}
commonAnnotations:
  reloader.stakater.com/auto: "true"

# Fallback for any py_flink_jobs entry that doesn't set its own
# `resources` (see templates/deployment.yaml) — mirrors `flink`'s
# top-level `resources` + per-job flink_jobs.*.resources override.
# This is the TaskManager default (actual processing happens there);
# JobManager gets the much lighter jobManagerResources below instead.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1
    memory: 2Gi

# JobManager only coordinates (no Kafka/whisper/LLM work happens there) —
# deliberately light, same for every job unless a job overrides
# jobManagerResources itself.
jobManagerResources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# Standalone Application Mode: dedicated JobManager (always 1 replica,
# see deployment.yaml) + TaskManager(s) per job, connected via the
# {{ jobName }}-jobmanager Service — mirrors the sibling `flink` chart's
# jobmanager/taskmanager port config exactly.
jobmanager:
  rpc_port: 6123
  blob_port: 6124
  query_port: 6125
  ui_port: 8081

taskmanager:
  rpc_port: 6122
  # Fallback for any py_flink_jobs entry that doesn't set its own
  # taskSlots. Total parallelism available = taskSlots * taskManagerReplicas
  # (job-level default replicaCount, or a job's own taskManagerReplicas).
  numberOfTaskSlots: 4

# Each job here is a singleton streaming job (one `flink run -py` driver
# process), not a horizontally-scalable stateless service — replicaCount
# stays at 1 and autoscaling is disabled by default, kept only for parity
# with other charts in this repo. In-job parallelism is controlled by
# each job's config.job.parallelism instead.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

nodeSelector: {}
tolerations: []
affinity: {}
# No GPU node-pool convention (nodeSelector/tolerations/taints/runtimeClass
# for e.g. nvidia.com/gpu) exists anywhere else in this repo today (checked
# learnbb and every other building block). caption-generator's
# transcription.device below defaults to "cpu" to match that reality. If/
# when a GPU node pool is added, set transcription.device: "cuda" on that
# job's config and populate nodeSelector/tolerations here (e.g. a taint
# like `nvidia.com/gpu=present:NoSchedule` + matching toleration).

serviceAccount:
  create: false
  name: ""
  annotations: {}

initContainers: {}
sidecars: {}

# Plumbing only for now — enabled: false, and no metrics.reporter is
# configured in ai-pipeline's job config yet (tracked separately). Both
# the jobmanager and taskmanager Services expose a "prom" named port
# (templates/service.yaml); this single broad-selector ServiceMonitor
# scrapes both, same as the sibling `flink` chart's own selector (which
# also doesn't distinguish jobmanager vs taskmanager, relying only on the
# named port existing). Once a Prometheus reporter is added on the
# ai-pipeline side, enabling this + setting prom_port to match is a
# values-only change.
serviceMonitor: &serviceMonitor
  enabled: false
  job:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: monitoring # additional labels e.g. release: prometheus
    honorLabels: true
    jobLabel: "app.kubernetes.io/name"
    port: prom

# Inert until ai-pipeline exposes a Prometheus reporter on this port.
prom_port: 9249

py_flink_jobs:
  enrichment-router:
    enabled: true

    # Points at helmcharts/images.yaml's global.enrichment_router anchor
    # (registry/repository/tag) — see templates/deployment.yaml.
    globalImageKey: enrichment_router

    # jobDir -> JM/TM containers' workingDir (/opt/sunbird-ai/jobs/<jobDir>).
    # pyEntrypoint -> the -py argument passed to PythonDriver, relative to
    # that workingDir (see ai-pipeline/docker/Dockerfile.enrichment-router).
    jobDir: enrichment_router
    pyEntrypoint: enrichment_router/main.py

    configPath: /opt/sunbird-ai/jobs/enrichment_router/config.yaml

    # Light job: read-only consumer, no model inference. This is the
    # TaskManager's resources (see jobManagerResources for the JM's).

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi

    # ── ai-pipeline jobs/enrichment_router/config.yaml, templated ─────────
    # Same key names/nesting as the upstream config.yaml. Secrets
    # (api keys, non-OIDC cloud storage credentials) are deliberately left
    # out — injected as SUNBIRD_AI_* env vars via secretEnv below instead.
    config:
      job:
        name: enrichment-router
        parallelism: 4

      kafka:
        brokers: "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
        group_id: "{{ .Values.global.env }}-enrichment-router"
        topics:
          input: "{{ .Values.global.env }}.knowlg.enriched.content.metadata"
          transcription_out: "{{ .Values.global.env }}.media.transcription.request"
          multilingual_out: "{{ .Values.global.env }}.media.multilingual.request"

      janusgraph:
        # janusgraph is a sibling subchart in this same knowledgebb
        # umbrella/namespace (charts/janusgraph, fullnameOverride:
        # "janusgraph"), reachable in-cluster by bare service name.
        host: "{{ .Values.global.janusgraph.host }}"
        port: "{{ .Values.global.janusgraph.port }}"

      schema:
        base_path: "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/schemas/local"

      knowlg:
        # Matches the content_service_url convention already used by
        # learnbb/charts/flink and edbb/charts/kong-apis (service name
        # "knowlg-service", port 9000). No api_key — internal calls to the
        # knowlg platform require no auth.
        content_service_url: "http://knowlg-service:9000"
        apis:
          transcript_create: /content/v4/transcript/create
          content_read: /content/v4/read/{identifier}

      cloud_storage_type: azure
      cloud_storage_auth_type: OIDC
      cloud_storage_container: "{{ .Values.global.public_container_name }}"
      # account_name is required for every Azure auth_type except DEV (see
      # ai-pipeline/core/sunbird_ai_core/storage/blob_util.py
      # _build_storage_options — OIDC/IAM still read config["account_name"],
      # only account_key is ACCESS_KEY-specific). Derived from
      # object_storage_endpoint ("<account_name>.blob.core.windows.net").
      cloud_storage_auth:
        account_name: "{{ (splitList \".\" .Values.global.object_storage_endpoint) | first }}"

      enrichment:
        transcript:
          enabled: true
          mime_types:
            - video/mp4
            - video/webm
          languages: []
          auto_approve:
            source: false
            multilingual: true

    # No secrets needed — enrichment-router never calls an external
    # authenticated API.
    secretEnv: []
    extraEnv: []

    serviceMonitor: *serviceMonitor

  caption-generator:
    enabled: true

    # Points at helmcharts/images.yaml's global.caption_generator anchor
    # (registry/repository/tag) — see templates/deployment.yaml.
    globalImageKey: caption_generator

    # jobDir -> JM/TM containers' workingDir (/opt/sunbird-ai/jobs/<jobDir>).
    # pyEntrypoint -> the -py argument passed to PythonDriver, relative to
    # that workingDir (see ai-pipeline/docker/Dockerfile.caption-generator).
    jobDir: caption_generator
    pyEntrypoint: caption_generator/main.py

    configPath: /opt/sunbird-ai/jobs/caption_generator/config.yaml

    # Heavier job: faster-whisper transcription (CPU by default, see
    # transcription.device below) + concurrent per-language LLM
    # translation calls via ThreadPoolExecutor.
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi

    # ── ai-pipeline jobs/caption_generator/config.yaml, templated ─────────
    # Same key names/nesting as the upstream config.yaml. Secrets (api
    # keys) are deliberately left out — injected as SUNBIRD_AI_* env vars
    # via secretEnv below instead.
    config:
      job:
        name: caption-generator
        parallelism: 4

      kafka:
        brokers: "{{ .Values.global.kafka.host }}:{{ .Values.global.kafka.port }}"
        group_id: "{{ .Values.global.env }}-caption-generator"
        topics:
          transcription_in: "{{ .Values.global.env }}.media.transcription.request"
          multilingual_in: "{{ .Values.global.env }}.media.multilingual.request"
          transcription_dlq: "{{ .Values.global.env }}.media.transcription.dlq"
          multilingual_dlq: "{{ .Values.global.env }}.media.multilingual.dlq"

      janusgraph:
        # janusgraph is a sibling subchart in this same knowledgebb
        # umbrella/namespace (charts/janusgraph, fullnameOverride:
        # "janusgraph"), reachable in-cluster by bare service name.
        host: "{{ .Values.global.janusgraph.host }}"
        port: "{{ .Values.global.janusgraph.port }}"

      schema:
        base_path: "https://{{ .Values.global.object_storage_endpoint }}/{{ .Values.global.public_container_name }}/schemas/local"

      knowlg:
        # Matches the content_service_url convention already used by
        # learnbb/charts/flink and edbb/charts/kong-apis (service name
        # "knowlg-service", port 9000). No api_key — internal calls to the
        # knowlg platform require no auth.
        content_service_url: "http://knowlg-service:9000"
        apis:
          transcript_create: /content/v4/transcript/create
          content_read: /content/v4/read/{identifier}

      cloud_storage_type: azure
      cloud_storage_auth_type: OIDC
      cloud_storage_container: "{{ .Values.global.public_container_name }}"
      # See config.cloud_storage_auth above (enrichment-router entry) —
      # account_name is required for OIDC too, not just ACCESS_KEY/IAM/DEV.
      cloud_storage_auth:
        account_name: "{{ (splitList \".\" .Values.global.object_storage_endpoint) | first }}"

      transcription:
        provider: faster_whisper
        model: large-v3-turbo
        device: cpu # set to "cuda" only once a GPU node pool exists (see nodeSelector/tolerations comment above)
        compute_type: int8
        auto_approve: false

      multilingual:
        provider: litellm
        # LLM model identifier passed straight through to LiteLLM (e.g.
        # "azure/gpt-4o-mini", "gpt-4o-mini" — see LiteLLM provider docs).
        # API key is injected via extraEnv below, never set in config
        # directly.
        model: "gpt-4o-mini"
        batch_size: 80
        context_overlap: 2
        auto_approve: true
        ecar:
          # Source language must always be Live for ECAR generation to
          # trigger. true (default): a permanently Failed language does
          # not block ECAR generation — the ECAR is built from whatever
          # languages succeeded. false: Failed is treated the same as
          # Draft/Review/Processing — blocks generation until that
          # language is retried/fixed.
          allow_failed_languages: true

    # No knowlg secret needed (internal calls, no auth). The LLM API key IS
    # a real external secret — TEMPORARY: injected here as a plaintext env
    # var straight from values, not yet a K8s Secret. Replace with a
    # secretEnv entry (see enrichment-router's secretEnv comment history /
    # git blame for the pattern) before any real deployment.
    secretEnv: []
    extraEnv:
      - name: SUNBIRD_AI_MULTILINGUAL_API_KEY
        value: "{{ .Values.global.ai_pipeline_llm_api_key }}"

    serviceMonitor: *serviceMonitor

{{/*
One-shot Job per enabled py_flink_jobs.<name> that actually submits the
PyFlink job to its now-real, already-running session cluster (see
deployment.yaml) via `flink run -m <jobmanager-service>:<rest-port> -py
<entrypoint> --config config.yaml` — verified empirically end to end:
real JobID assigned, job actually executed on the TaskManager.

A Helm hook (not a plain Job) so it reruns cleanly on every
install/upgrade instead of hitting Kubernetes' Job-spec-is-immutable
wall the way the kafka provisioning Job (templates/provision/kafka.yaml
in the parent knowledgebb chart) did — hook-delete-policy removes the
previous run's Job before creating the new one.
*/}}
{{- $currentScope := . }}
{{- range $jobName, $jobData := .Values.py_flink_jobs }}
{{- if $jobData.enabled }}
{{- with $currentScope }}
{{- $img := index .Values.global $jobData.globalImageKey }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-submit" $jobName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "common.names.name" . }}
        app.kubernetes.io/component: {{ printf "%s-submit" $jobName }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Plain TCP wait — the base flink image has no wait-for-port
        # utility (that's bitnami-image-specific, used elsewhere in this
        # repo's kafka provisioning Job). `flink run` itself does retry
        # internally, but only for a limited window — waiting explicitly
        # here is more reliable than relying on that alone.
        - name: wait-for-jobmanager
          image: "{{ $img.registry }}/{{ $img.repository }}:{{ $img.tag }}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              until (echo > /dev/tcp/{{ printf "%s-jobmanager" $jobName }}/{{ $.Values.jobmanager.ui_port }}) 2>/dev/null; do
                echo "Waiting for {{ printf "%s-jobmanager" $jobName }}:{{ $.Values.jobmanager.ui_port }} ..."
                sleep 3
              done
              echo "JobManager REST endpoint is up."
      containers:
        - name: submit
          image: "{{ $img.registry }}/{{ $img.repository }}:{{ $img.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /opt/sunbird-ai/jobs/{{ $jobData.jobDir }}
          # No `command:` override — args alone hit docker-entrypoint.sh's
          # pass-through branch ("flink" isn't jobmanager/taskmanager/
          # standalone-job/history-server), so this execs verbatim.
          args: ["flink", "run",
            "-m", '{{ printf "%s-jobmanager" $jobName }}:{{ .Values.jobmanager.ui_port }}',
            "-py", "{{ $jobData.pyEntrypoint }}",
            "--config", "config.yaml"]
          env:
            {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
            - name: AZURE_CLIENT_ID
              value: "{{ .Values.global.azure_client_id }}"
            {{- end }}
            {{- range $jobData.secretEnv }}
            - name: {{ .envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
                  optional: {{ .optional | default false }}
            {{- end }}
            {{- if $jobData.extraEnv }}
            {{- include "common.tplvalues.render" (dict "value" $jobData.extraEnv "context" $) | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config-volume
              mountPath: {{ $jobData.configPath }}
              subPath: config.yaml
      volumes:
        - name: config-volume
          configMap:
            name: {{ printf "%s-config" $jobName }}
            items:
              - key: config.yaml
                path: config.yaml
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}

{{/*
JobManager + TaskManager Deployment pair per enabled py_flink_jobs.<name>
entry — real Application Mode, job baked directly into the JobManager's
own startup command, same as the sibling `flink` chart's --job-classname
pattern (a JM restart re-runs this same command, which re-submits the
job as a side effect — no separate resubmission step needed, matching
how Java/Scala jobs behave here).

Two real bugs had to be fixed to get here (both confirmed via direct
testing, not guesswork):
  1. Kubernetes' `command:` field replaces the image's ENTRYPOINT
     entirely (unlike plain `docker run <image> args...`, which appends
     to it) — so args must NOT set `command:`, and "standalone-job" /
     "jobmanager" / "taskmanager" go in `args` instead, letting the
     inherited docker-entrypoint.sh dispatch on them.
  2. docker-entrypoint.sh's own "standalone-job"/"jobmanager" branches
     already hardcode "start-foreground" themselves — including it again
     in our own args gets it forwarded twice, corrupting the underlying
     script's positional argument parsing.
  3. PythonDriver (org.apache.flink.client.python.PythonDriver, Flink's
     generic driver for running a Python script as the cluster's job)
     has its own strict argument parser — ClusterEntrypoint forwards its
     entire, unfiltered arg list to it, and PythonDriver breaks on ANY
     flag it doesn't recognize, anywhere in that list. So JM's `args`
     must contain ONLY --job-classname/-py/--config — nothing else, no
     -D flags mixed in. All cluster config (rpc/blob/query/rest ports,
     parallelism) goes via FLINK_PROPERTIES instead, exactly like the
     official Flink Kubernetes Operator's own FlinkDeployment spec does
     for PyFlink jobs (verified against its documented example).
*/}}
{{- $currentScope := . }}
{{- range $jobName, $jobData := .Values.py_flink_jobs }}
{{- if $jobData.enabled }}
{{- with $currentScope }}
{{- $img := index .Values.global $jobData.globalImageKey }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-taskmanager" $jobName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  annotations:
    checksum/job-config: {{ $jobData.config | toYaml | sha256sum }}
  {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ $jobData.taskManagerReplicas | default .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "common.names.name" . }}
      app.kubernetes.io/component: {{ printf "%s-taskmanager" $jobName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "common.names.name" . }}
        app.kubernetes.io/component: {{ printf "%s-taskmanager" $jobName }}
        {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.workload_identity_service_account_name }}
        azure.workload.identity/use: "true"
        {{- end }}
      annotations:
        checksum/job-config: {{ $jobData.config | toYaml | sha256sum }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.global.workload_identity_service_account_name }}
      serviceAccountName: {{ .Values.global.workload_identity_service_account_name | default (.Values.serviceAccount.name | default $jobName) }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $jobName }}-taskmanager
          image: "{{ $img.registry }}/{{ $img.repository }}:{{ $img.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Python UDFs/process functions run in a worker process spawned by
          # the TaskManager (not the JobManager) — same workingDir as the
          # JobManager so any relative-path config lookup behaves the same.
          workingDir: /opt/sunbird-ai/jobs/{{ $jobData.jobDir }}
          # No `command:` override (Kubernetes' command replaces the
          # image's ENTRYPOINT entirely, unlike plain `docker run <image>
          # args...` which appends to it) and no "start-foreground" in
          # args either — docker-entrypoint.sh's own "taskmanager" branch
          # already hardcodes start-foreground; including it again here
          # gets forwarded as a stray extra arg. All cluster config goes
          # via FLINK_PROPERTIES below, never -D flags in args.
          args: ["taskmanager"]
          ports:
            - containerPort: {{ .Values.taskmanager.rpc_port }}
              name: rpc
          env:
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: {{ printf "%s-jobmanager" $jobName }}
                jobmanager.rpc.port: {{ .Values.jobmanager.rpc_port }}
                taskmanager.rpc.port: {{ .Values.taskmanager.rpc_port }}
                taskmanager.numberOfTaskSlots: {{ $jobData.taskSlots | default .Values.taskmanager.numberOfTaskSlots }}
            {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
            - name: AZURE_CLIENT_ID
              value: "{{ .Values.global.azure_client_id }}"
            {{- end }}
            {{- range $jobData.secretEnv }}
            - name: {{ .envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
                  optional: {{ .optional | default false }}
            {{- end }}
            {{- if $jobData.extraEnv }}
            {{- include "common.tplvalues.render" (dict "value" $jobData.extraEnv "context" $) | nindent 12 }}
            {{- end }}
          resources:
            {{- if $jobData.resources }}
            {{- toYaml $jobData.resources | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: {{ $jobData.configPath }}
              subPath: config.yaml
      {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ printf "%s-config" $jobName }}
            items:
              - key: config.yaml
                path: config.yaml
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-jobmanager" $jobName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  annotations:
    checksum/job-config: {{ $jobData.config | toYaml | sha256sum }}
  {{- if .Values.commonAnnotations }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  # Always 1 — this is a dedicated per-job JobManager (Application Mode),
  # not a shared multi-tenant one; more than one would just fight over
  # leadership, not add capacity. Scale processing via taskManagerReplicas
  # / taskSlots instead.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "common.names.name" . }}
      app.kubernetes.io/component: {{ printf "%s-jobmanager" $jobName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "common.names.name" . }}
        app.kubernetes.io/component: {{ printf "%s-jobmanager" $jobName }}
        {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.workload_identity_service_account_name }}
        azure.workload.identity/use: "true"
        {{- end }}
      annotations:
        checksum/job-config: {{ $jobData.config | toYaml | sha256sum }}
    spec:
      {{- if or .Values.serviceAccount.create .Values.global.workload_identity_service_account_name }}
      serviceAccountName: {{ .Values.global.workload_identity_service_account_name | default (.Values.serviceAccount.name | default $jobName) }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $jobName }}-jobmanager
          image: "{{ $img.registry }}/{{ $img.repository }}:{{ $img.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /opt/sunbird-ai/jobs/{{ $jobData.jobDir }}
          # No `command:` override, no "start-foreground" in args (see
          # file header). args must contain ONLY what PythonDriver's own
          # strict parser understands — --job-classname, -py, --config —
          # nothing else. All cluster config goes via FLINK_PROPERTIES.
          args: ["standalone-job",
            "--job-classname", "org.apache.flink.client.python.PythonDriver",
            "-py", "{{ $jobData.pyEntrypoint }}",
            "--config", "config.yaml"]
          ports:
            - containerPort: {{ .Values.jobmanager.rpc_port }}
              name: rpc
            - containerPort: {{ .Values.jobmanager.blob_port }}
              name: blob
            - containerPort: {{ .Values.jobmanager.query_port }}
              name: query
            - containerPort: {{ .Values.jobmanager.ui_port }}
              name: ui
          env:
            # JOB_MANAGER_RPC_ADDRESS is read by docker-entrypoint.sh
            # directly (not just via FLINK_PROPERTIES) to set
            # jobmanager.rpc.address — verified empirically that without
            # this explicit env var, it falls back to `hostname -f`, which
            # resolved to garbage in testing and broke the Service DNS
            # TaskManagers connect through.
            - name: JOB_MANAGER_RPC_ADDRESS
              value: {{ printf "%s-jobmanager" $jobName }}
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.port: {{ .Values.jobmanager.rpc_port }}
                blob.server.port: {{ .Values.jobmanager.blob_port }}
                queryable-state.server.ports: {{ .Values.jobmanager.query_port }}
                rest.port: {{ .Values.jobmanager.ui_port }}
                rest.address: 0.0.0.0
                parallelism.default: {{ $jobData.config.job.parallelism | default 1 }}
            {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
            - name: AZURE_CLIENT_ID
              value: "{{ .Values.global.azure_client_id }}"
            {{- end }}
            {{- range $jobData.secretEnv }}
            - name: {{ .envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .secretKey }}
                  optional: {{ .optional | default false }}
            {{- end }}
            {{- if $jobData.extraEnv }}
            {{- include "common.tplvalues.render" (dict "value" $jobData.extraEnv "context" $) | nindent 12 }}
            {{- end }}
          resources:
            {{- if $jobData.jobManagerResources }}
            {{- toYaml $jobData.jobManagerResources | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.jobManagerResources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: {{ $jobData.configPath }}
              subPath: config.yaml
      {{- with .Values.sidecars }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ printf "%s-config" $jobName }}
            items:
              - key: config.yaml
                path: config.yaml
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}

            {{- if $jobData.resources }}
            {{- toYaml $jobData.resources | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
          - name: flink-config-volume
            mountPath: /opt/flink/conf/flink-conf.yaml
            subPath: flink-conf.yaml
          - name: flink-config-volume
            mountPath: /data/flink/conf/base-config.conf
            subPath: base-config.conf
          - name: flink-config-volume
            mountPath: /data/flink/conf/{{ $jobName }}.conf
            subPath: {{ $jobName }}.conf
          - name: flink-config-volume
            mountPath: /opt/flink/conf/log4j-console.properties
            subPath: log4j-console.properties
          {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
          - name: flink-merged-lib
            mountPath: {{ .Values.lib_mount_path }}
          {{- end }}
          {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
          - name: flink-s3-plugin-volume
            mountPath: /opt/flink/plugins
          {{- end }}
      volumes:
      - name: flink-config-volume
        configMap:
          name: {{ $jobName }}-config
          items:
          - key: flink-conf
            path: flink-conf.yaml
          - key: base-config
            path: base-config.conf
          - key: config
            path: {{ $jobName }}.conf
          - key: log4j_console_properties
            path: log4j-console.properties
      {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}

{{- $currentScope := . }}
{{- range $jobName, $jobData := .Values.flink_jobs }}

  {{- if $jobData.enabled }}
    {{- with $currentScope }}

      {{- $component := "taskmanager" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" $jobName $component }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  annotations:
    checksum/config: {{ .Files.Glob "configs/*" | toYaml | sha256sum }}
    checksum/job-config: {{ $jobData | toYaml | sha256sum }}
  {{- if .Values.commonAnnotations }}
    {{ include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "common.names.name" . }}
      app.kubernetes.io/component: {{ printf "%s-%s" $jobName $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "common.names.name" . }}
        app.kubernetes.io/component: {{ printf "%s-%s" $jobName $component }}
        {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.workload_identity_service_account_name }}
        azure.workload.identity/use: "true"
        {{- end }}
      annotations:
        checksum/config: {{ .Files.Glob "configs/*" | toYaml | sha256sum }}
        checksum/job-config: {{ $jobData | toYaml | sha256sum }}
    spec:
      {{- if .Values.global.workload_identity_service_account_name }}
      serviceAccountName: {{ .Values.global.workload_identity_service_account_name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3")) (and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled) .Values.initContainers }}
      initContainers:
      {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
      - name: flink-lib-merge
        image: "{{ .Values.global.knowledgeflink.registry }}/{{ .Values.global.knowledgeflink.repository }}:{{ .Values.global.knowledgeflink.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
          - cp -r {{ .Values.lib_mount_path }}/. /merged-lib/
        volumeMounts:
        - name: flink-merged-lib
          mountPath: /merged-lib
      - name: flink-csp-aws-deps
        image: {{ .Values.aws_csp.maven_image }}
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            cat > /tmp/pom.xml <<'POM'
            <project xmlns="http://maven.apache.org/POM/4.0.0"><modelVersion>4.0.0</modelVersion><groupId>tmp</groupId><artifactId>tmp</artifactId><version>1</version>
            <dependencies><dependency><groupId>org.sunbird</groupId><artifactId>cloud-storage-sdk-aws</artifactId><version>{{ .Values.aws_csp.artifact_version }}</version></dependency></dependencies></project>
            POM
            mvn -f /tmp/pom.xml -q dependency:copy-dependencies -DoutputDirectory=/tmp/deps
            cp /tmp/deps/*.jar /merged-lib/
        volumeMounts:
        - name: flink-merged-lib
          mountPath: /merged-lib
      {{- end }}
      {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
      - name: flink-s3-plugin-setup
        image: "{{ .Values.global.knowledgeflink.registry }}/{{ .Values.global.knowledgeflink.repository }}:{{ .Values.global.knowledgeflink.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
          - mkdir -p /tmp/flink-plugins/flink-s3-fs-hadoop /tmp/flink-plugins/flink-s3-fs-presto; cp -R /opt/flink/plugins/. /tmp/flink-plugins/ 2>/dev/null || true; cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /tmp/flink-plugins/flink-s3-fs-hadoop/; cp /opt/flink/opt/flink-s3-fs-presto-*.jar /tmp/flink-plugins/flink-s3-fs-presto/
        volumeMounts:
        - name: flink-s3-plugin-volume
          mountPath: /tmp/flink-plugins
      {{- end }}
      {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.global.knowledgeflink.registry }}/{{ .Values.global.knowledgeflink.repository }}:{{ .Values.global.knowledgeflink.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.taskmanager.flink_work_dir }}
          command: ["/opt/flink/bin/taskmanager.sh"]
          args: ["start-foreground",
  {{- if eq .Values.global.checkpoint_store_type "gcs" }}
            "-Dgoogle.cloud.auth.service.account.enable=true",
            "-Dfs.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem",
            "-Dfs.AbstractFileSystem.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS",
            "-DHADOOP_CONF_DIR=/opt/flink/conf",
  {{- end }}
  {{- if eq .Values.global.checkpoint_store_type "azure" }}
            "-Dfs.azure.account.auth.type.{{ .Values.global.object_storage_endpoint }}=OAuth",
            "-Dfs.azure.account.oauth.provider.type.{{ .Values.global.object_storage_endpoint }}=org.apache.hadoop.fs.azurebfs.oauth2.WorkloadIdentityTokenProvider",
            "-Dfs.azure.account.oauth2.msi.tenant.{{ .Values.global.object_storage_endpoint }}=$(AZURE_TENANT_ID)",
            "-Dfs.azure.account.oauth2.client.id.{{ .Values.global.object_storage_endpoint }}=$(AZURE_CLIENT_ID)",
  {{- end }}
  {{- if and (or (eq .Values.global.checkpoint_store_type "s3") (eq .Values.global.checkpoint_store_type "oci")) (or .Values.s3_endpoint .Values.s3_access_key) }}
            "-Ds3.access-key={{ .Values.s3_access_key }}",
            "-Ds3.secret-key={{ .Values.s3_secret_key }}",
            "-Ds3.endpoint={{ .Values.s3_endpoint }}",
            "-Ds3.path.style.access={{ .Values.s3_path_style_access }}",
  {{- end }}
  {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
            "-Dplugins.dir=/opt/flink/plugins",
  {{- end }}
            "-Dweb.submit.enable=false",
            "-Dmetrics.reporters=prom",
            "-Dmetrics.reporter.prom.factory.class=org.apache.flink.metrics.prometheus.PrometheusReporterFactory",
            "-Dmetrics.reporter.prom.port={{ .Values.taskmanager.prom_port }}",
            "-Dmetrics.reporter.prom.port=9251-9260",
            "-Djobmanager.rpc.address={{ $jobName }}-jobmanager",
            "-Dtaskmanager.rpc.port={{ .Values.taskmanager.rpc_port }}"]
          ports:
          - containerPort: {{ .Values.taskmanager.rpc_port }}
            name: rpc
          env:
          {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
          - name: AZURE_CLIENT_ID
            value: "{{ .Values.global.azure_client_id }}"
          {{- end }}
          {{- if eq .Values.global.cloud_storage_provider "aws" }}
          - name: AWS_ACCESS_KEY_ID
            value: "{{ .Values.global.cloud_storage_access_key }}"
          - name: AWS_SECRET_ACCESS_KEY
            value: "{{ .Values.global.cloud_storage_secret_key }}"
          - name: AWS_DEFAULT_REGION
            value: "{{ .Values.global.cloud_storage_region }}"
          {{- end }}
          resources:
            {{- if $jobData.resources }}
            {{- toYaml $jobData.resources | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
          - name: flink-config-volume
            mountPath: /opt/flink/conf/flink-conf.yaml
            subPath: flink-conf.yaml
          - name: flink-config-volume
            mountPath: /opt/flink/conf/log4j-console.properties
            subPath: log4j-console.properties
          {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
          - name: flink-merged-lib
            mountPath: {{ .Values.lib_mount_path }}
          {{- end }}
          {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
          - name: flink-s3-plugin-volume
            mountPath: /opt/flink/plugins
          {{- end }}
      volumes:
      - name: flink-config-volume
        configMap:
          name: {{ $jobName }}-config
          items:
          - key: flink-conf
            path: flink-conf.yaml
          - key: log4j_console_properties
            path: log4j-console.properties
      {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
      - name: flink-merged-lib
        emptyDir: {}
      {{- end }}
      {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
      - name: flink-s3-plugin-volume
        emptyDir: {}
      {{- end }}
{{ $component := "jobmanager" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" $jobName $component }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  annotations:
    checksum/config: {{ .Files.Glob "configs/*" | toYaml | sha256sum }}
    checksum/job-config: {{ $jobData | toYaml | sha256sum }}
  {{- if .Values.commonAnnotations }}
  {{ include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "common.names.name" . }}
      app.kubernetes.io/component: {{ printf "%s-%s" $jobName $component }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "common.names.name" . }}
        app.kubernetes.io/component: {{ printf "%s-%s" $jobName $component }}
        {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.workload_identity_service_account_name }}
        azure.workload.identity/use: "true"
        {{- end }}
      annotations:
        checksum/config: {{ .Files.Glob "configs/*" | toYaml | sha256sum }}
        checksum/job-config: {{ $jobData | toYaml | sha256sum }}
    spec:
      {{- if .Values.global.workload_identity_service_account_name }}
      serviceAccountName: {{ .Values.global.workload_identity_service_account_name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3")) (and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled) .Values.initContainers }}
      initContainers:
      {{- if and (eq .Values.global.cloud_storage_provider "aws") .Values.aws_csp.enabled }}
      - name: flink-lib-merge
        image: "{{ .Values.global.knowledgeflink.registry }}/{{ .Values.global.knowledgeflink.repository }}:{{ .Values.global.knowledgeflink.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["sh", "-c"]
        args:
          - cp -r {{ .Values.lib_mount_path }}/. /merged-lib/
        volumeMounts:
        - name: flink-merged-lib
          mountPath: /merged-lib
      - name: flink-csp-aws-deps
        image: {{ .Values.aws_csp.maven_image }}
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            cat > /tmp/pom.xml <<'POM'
            <project xmlns="http://maven.apache.org/POM/4.0.0"><modelVersion>4.0.0</modelVersion><groupId>tmp</groupId><artifactId>tmp</artifactId><version>1</version>
            <dependencies><dependency><groupId>org.sunbird</groupId><artifactId>cloud-storage-sdk-aws</artifactId><version>{{ .Values.aws_csp.artifact_version }}</version></dependency></dependencies></project>
            POM
            mvn -f /tmp/pom.xml -q dependency:copy-dependencies -DoutputDirectory=/tmp/deps
            cp /tmp/deps/*.jar /merged-lib/
        volumeMounts:
        - name: flink-merged-lib
          mountPath: /merged-lib
      {{- end }}
      {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
      - name: flink-s3-plugin-setup
        image: "{{ .Values.global.knowledgeflink.registry }}/{{ .Values.global.knowledgeflink.repository }}:{{ .Values.global.knowledgeflink.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
          - mkdir -p /tmp/flink-plugins/flink-s3-fs-hadoop /tmp/flink-plugins/flink-s3-fs-presto; cp -R /opt/flink/plugins/. /tmp/flink-plugins/ 2>/dev/null || true; cp /opt/flink/opt/flink-s3-fs-hadoop-*.jar /tmp/flink-plugins/flink-s3-fs-hadoop/; cp /opt/flink/opt/flink-s3-fs-presto-*.jar /tmp/flink-plugins/flink-s3-fs-presto/
        volumeMounts:
        - name: flink-s3-plugin-volume
          mountPath: /tmp/flink-plugins
      {{- end }}
      {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.global.knowledgeflink.registry }}/{{ .Values.global.knowledgeflink.repository }}:{{ .Values.global.knowledgeflink.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: {{ .Values.jobmanager.flink_work_dir }}
          command: ["/opt/flink/bin/standalone-job.sh"]
          args: ["start-foreground",
  {{- if eq .Values.global.checkpoint_store_type "gcs" }}
            "-Dgoogle.cloud.auth.service.account.enable=true",
            "-Dfs.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem",
            "-Dfs.AbstractFileSystem.gs.impl=com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS",
            "-DHADOOP_CONF_DIR=/opt/flink/conf",
  {{- end }}
  {{- if eq .Values.global.checkpoint_store_type "azure" }}
            "-Dfs.azure.account.auth.type.{{ .Values.global.object_storage_endpoint }}=OAuth",
            "-Dfs.azure.account.oauth.provider.type.{{ .Values.global.object_storage_endpoint }}=org.apache.hadoop.fs.azurebfs.oauth2.WorkloadIdentityTokenProvider",
            "-Dfs.azure.account.oauth2.msi.tenant.{{ .Values.global.object_storage_endpoint }}=$(AZURE_TENANT_ID)",
            "-Dfs.azure.account.oauth2.client.id.{{ .Values.global.object_storage_endpoint }}=$(AZURE_CLIENT_ID)",
  {{- end }}
  {{- if and (or (eq .Values.global.checkpoint_store_type "s3") (eq .Values.global.checkpoint_store_type "oci")) (or .Values.s3_endpoint .Values.s3_access_key) }}
            "-Ds3.access-key={{ .Values.s3_access_key }}",
            "-Ds3.secret-key={{ .Values.s3_secret_key }}",
            "-Ds3.endpoint={{ .Values.s3_endpoint }}",
            "-Ds3.path.style.access={{ .Values.s3_path_style_access }}",
  {{- end }}
  {{- if or (eq .Values.global.checkpoint_store_type "oci") (eq .Values.global.checkpoint_store_type "s3") }}
            "-Dplugins.dir=/opt/flink/plugins",
  {{- end }}
                "--job-classname={{ $jobData.job_classname }}",
                "-Dweb.submit.enable=false",
                "-Dmetrics.reporters=prom",
                "-Dmetrics.reporter.prom.factory.class=org.apache.flink.metrics.prometheus.PrometheusReporterFactory",
                "-Dmetrics.reporter.prom.port={{ .Values.jobmanager.prom_port }}",
                "-Djobmanager.rpc.address={{ $jobName }}-jobmanager",
                "-Djobmanager.rpc.port={{ .Values.jobmanager.rpc_port }}",
                "-Dparallelism.default=1",
                "-Dblob.server.port={{ .Values.jobmanager.blob_port }}",
                "-Dqueryable-state.server.ports={{ .Values.jobmanager.query_port }}",
                "--config.file.path",
                "/data/flink/conf/{{ $jobName }}.conf"]
          ports:
            {{- range .Values.service.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
            {{- end }}
          env:
          {{- if and (eq .Values.global.cloud_storage_provider "azure") .Values.global.azure_client_id }}
          - name: AZURE_CLIENT_ID
            value: "{{ .Values.global.azure_client_id }}"
          {{- end }}
          {{- if eq .Values.global.cloud_storage_provider "aws" }}
          - name: AWS_ACCESS_KEY_ID
            value: "{{ .Values.global.cloud_storage_access_key }}"
          - name: AWS_SECRET_ACCESS_KEY
            value: "{{ .Values.global.cloud_storage_secret_key }}"
          - name: AWS_DEFAULT_REGION
            value: "{{ .Values.global.cloud_storage_region }}"
          {{- end }}
